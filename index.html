<!DOCTYPE html>
<html lang="en">
<head>
    <!-- FIX: Corrected your Google Library Script URL here -->
    <script src="https://google.com" async defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pibble Clicker - Aki.fun</title>
    <style>
        body { 
            background: url("bg_peach.jpg") repeat center center fixed; 
            background-size: auto; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0; 
        }
        
        .clicker-container { display: flex; justify-content: center; align-items: center; gap: 50px; flex-wrap: wrap; margin-top: 60px; max-width: 1000px; margin-left: auto; margin-right: auto; }
        
        .stats-panel { 
            flex: 1; 
            min-width: 320px; 
            background: rgba(24, 24, 27, 0.9); 
            border: 2px solid #27272a; 
            border-radius: 16px; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
        }
        
        .score-counter { font-size: 3rem; font-weight: 900; color: #ffcc00; margin: 0; }
        .gps-counter { color: #a1a1aa; font-size: 1.2rem; font-weight: bold; margin: 5px 0 25px 0; }
        
        .pibble-frame { width: 280px; height: 280px; border-radius: 50%; background: #18181b; border: 6px solid #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: transform 0.05s ease; user-select: none; }
        .pibble-frame:active { transform: scale(0.95); border-color: #ffcc00; }
        .pibble-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .shop-panel { width: 340px; background: rgba(24, 24, 27, 0.9); border: 2px solid #27272a; border-radius: 16px; padding: 20px; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .shop-title { margin-top: 0; color: #ffcc00; border-bottom: 2px solid #27272a; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .upgrade-row { display: flex; justify-content: space-between; align-items: center; background: #27272a; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid transparent; transition: border-color 0.2s; }
        .upgrade-row:hover { border-color: #ffcc00; }
        .upgrade-info { flex: 1; padding-right: 10px; }
        .upgrade-name { font-weight: bold; font-size: 14px; margin: 0; }
        .upgrade-effect { font-size: 11px; color: #a1a1aa; margin: 2px 0 0 0; }
        
        .buy-btn { background: #ffcc00; border: none; color: black; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 13px; min-width: 80px; text-align: center; }
        .buy-btn:disabled { background: #444; color: #777; cursor: not-allowed; }
        
        footer { 
            display: inline-block; 
            margin-top: 60px; 
            background: rgba(24, 24, 27, 0.9); 
            border: 1px solid #27272a; 
            padding: 10px 20px; 
            border-radius: 8px; 
            color: #ffcc00; 
            font-size: 14px; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); 
        }
    </style>
</head>
<body>

    <!-- REAL-TIME BACKGROUND MUSIC AUDIO PLAYBACK ELEMENT -->
    <audio id="bg-audio-player" src="desifreemusic-bouncy-soul-269874.mp3" loop></audio>

    <!-- INTERFACE ENGINE OVERLAY CONTROLS (MUSIC & LEADERBOARD) -->
    <button id="music-toggle-btn" onclick="toggleAudioEngine()" style="position: absolute; top: 10px; right: 10px; background: rgba(24,24,27,0.9); border: 2px solid #ffcc00; color: #ffcc00; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; z-index: 10;">🎵 Music: OFF</button>
    <button id="leaderboard-toggle-btn" onclick="toggleLeaderboardView(true)" style="position: absolute; top: 10px; right: 125px; background: rgba(24,24,27,0.9); border: 2px solid #ffcc00; color: #ffcc00; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; z-index: 10;">🏆 Leaderboard</button>

    <!-- PLACE HERE: THE GOOGLE SIGN IN BUTTON CONTAINER -->
    <div style="position: absolute; top: 10px; right: 240px; z-index: 10;">
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_://googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="medium" data-theme="dark" data-shape="rectangular"></div>
    </div>

    <!-- GLOBAL STANDINGS LEADERBOARD MODAL POPUP (SPLIT SIDE-BY-SIDE VIEW) -->
    <div id="leaderboard-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; display: none; align-items: center; justify-content: center; box-sizing: border-box; padding: 20px;">

        <div style="background: #18181b; border: 3px solid #ffcc00; padding: 25px; border-radius: 16px; width: 620px; max-width: 95%; text-align: center; box-shadow: 0 0 25px rgba(255,204,0,0.3);">
            <h2 style="color: #ffcc00; margin-top: 0; text-transform: uppercase; font-size: 1.4rem; border-bottom: 2px solid #27272a; padding-bottom: 8px;">🏆 Pibble Global Standings</h2>
            
            <div style="display: flex; gap: 15px; margin-top: 20px; justify-content: space-between; flex-wrap: wrap;">
                <!-- Left Board: Total Rubs -->
                <div style="flex: 1; min-width: 250px; background: #27272a; padding: 15px; border-radius: 8px; border: 1px solid #3f3f46;">
                    <h3 style="color: #ffcc00; margin-top: 0; font-size: 1.05rem; border-bottom: 1px solid #3f3f46; padding-bottom: 5px;">🪙 Most Rubs</h3>
                    <ol id="most-rubs-list" style="text-align: left; padding-left: 20px; color: #e4e4e7; line-height: 1.8; font-size: 13px; font-weight: bold; margin-bottom: 0;"></ol>
                </div>
                <!-- Right Board: Rubs Per Second -->
                <div style="flex: 1; min-width: 250px; background: #27272a; padding: 15px; border-radius: 8px; border: 1px solid #3f3f46;">
                    <h3 style="color: #ffcc00; margin-top: 0; font-size: 1.05rem; border-bottom: 1px solid #3f3f46; padding-bottom: 5px;">⚡ Rubs Per Second</h3>
                    <ol id="rps-list" style="text-align: left; padding-left: 20px; color: #e4e4e7; line-height: 1.8; font-size: 13px; font-weight: bold; margin-bottom: 0;"></ol>
                </div>
            </div>
            <p style="font-size: 10px; color: #a1a1aa; margin-top: 15px; margin-bottom: 0;">🔄 Data purges and refreshes every 5 minutes for performance stability.</p>
            <button onclick="toggleLeaderboardView(false)" style="background: #ef4444; border: none; color: white; width: 100px; padding: 8px; font-weight: bold; margin-top: 15px; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 11px;">Close</button>
        </div>
    </div>

    <!-- HIDDEN ADULT SECURITY ADMINISTRATIVE CONSOLE LAYOUT CARD -->
    <div id="admin-panel-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; display: none; align-items: center; justify-content: center; box-sizing: border-box;">
        <div style="background: #18181b; border: 3px solid #ffcc00; padding: 25px; border-radius: 16px; width: 280px; text-align: left; box-shadow: 0 0 25px rgba(255,204,0,0.3);">
            <h2 style="color: #ffcc00; margin-top: 0; text-transform: uppercase; font-size: 1.3rem; border-bottom: 2px solid #27272a; padding-bottom: 5px; text-align: center;">👑 Pibble Dev Menu</h2>
            
            <label style="font-size: 11px; text-transform: uppercase; color: #a1a1aa; font-weight: bold; display: block; margin-top: 15px;">Aura Score Mod:</label>
            <button onclick="adminGivePoints(1000)" style="background: #4caf50; border: none; color: white; width: 100%; padding: 8px; font-weight: bold; margin-top: 5px; border-radius: 6px; cursor: pointer;">+1,000 Rubs 🪙</button>
            <button onclick="adminGivePoints(100000)" style="background: #a855f7; border: none; color: white; width: 100%; padding: 8px; font-weight: bold; margin-top: 5px; border-radius: 6px; cursor: pointer;">+100,000 Rubs 🚀</button>
            
            <label style="font-size: 11px; text-transform: uppercase; color: #a1a1aa; font-weight: bold; display: block; margin-top: 15px;">System State Actions:</label>
            <button onclick="adminResetScore()" style="background: #ef4444; border: none; color: white; width: 100%; padding: 8px; font-weight: bold; margin-top: 5px; border-radius: 6px; cursor: pointer;">Wipe Game Save ❌</button>
            
            <button onclick="toggleAdminView(false)" style="background: #27272a; border: 1px solid #3f3f46; color: white; width: 100%; padding: 8px; font-weight: bold; margin-top: 20px; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 12px; text-align: center;">Close Console</button>
        </div>
    </div>
    
    <h1 style="margin-top:20px; font-size: 3rem; text-transform: uppercase; letter-spacing: 1px; color: white; text-shadow: 0 4px 12px rgba(0,0,0,0.9);">❤️ Pibble Clicker ❤️</h1>

    <div class="clicker-container">
        <div class="stats-panel">
            <h2 class="score-counter" id="total-scratches">0 Rubs</h2>
            <div class="gps-counter" id="scrub-rate">0 rubs per second (RPS)</div>
            
            <div class="pibble-frame" onclick="triggerBellyScratch()">
                <img src="pibble.jpg" alt="I am pibble wash ma belly">
            </div>
        </div>

        <div class="shop-panel">
            <h3 class="shop-title">🧽 Scrub Store</h3>
            <div id="shop-target"></div>
        </div>
    </div>

    <script>
        const upgradeRegistry = [
            { name: "Soft Hand Brushes", baseCost: 15, costMultiplier: 1.15, spsValue: 0.1, desc: "Light grooming tickles." },
            { name: "Automatic Scratch Mittens", baseCost: 100, costMultiplier: 1.15, spsValue: 1, desc: "Consistent scratch distribution." },
            { name: "Industrial Belly Roller", baseCost: 1100, costMultiplier: 1.15, spsValue: 8, desc: "Heavy-duty full body massage mechanics." },
            { name: "Sausage Treats Payout", baseCost: 12000, costMultiplier: 1.15, spsValue: 47, desc: "Increases passive cooperation metrics." }
        ];

        let savedData = localStorage.getItem('pibble_clicker_save');
        let gameData = {
            scratches: 0,
            totalSps: 0,
            clickValue: 1,
            upgradesOwned: new Array(upgradeRegistry.length).fill(0)
        };

        if (savedData) {
            try {
                let parsed = JSON.parse(savedData);
                gameData.scratches = parsed.scratches || parsed.rubs || 0;
                gameData.clickValue = parsed.clickValue || 1;
                if (parsed.upgradesOwned && parsed.upgradesOwned.length === upgradeRegistry.length) {
                    gameData.upgradesOwned = parsed.upgradesOwned;
                }
            } catch(e) {
                console.log("Memory reset triggered");
            }
        }

        function saveGame() {
            localStorage.setItem('pibble_clicker_save', JSON.stringify(gameData));
        }

        function triggerBellyScratch() {
            gameData.scratches += gameData.clickValue;
            updateInterfaceText();
            saveGame();
        }

        function calculateSps() {
            let total = 0;
            upgradeRegistry.forEach((item, index) => {
                total += gameData.upgradesOwned[index] * item.spsValue;
            });
            gameData.totalSps = parseFloat(total.toFixed(1));
            document.getElementById('scrub-rate').innerText = `${gameData.totalSps} rubs per second (RPS)`;
        }

        function getUpgradeCurrentCost(index) {
            const upgrade = upgradeRegistry[index];
            const quantity = gameData.upgradesOwned[index];
            return Math.floor(upgrade.baseCost * Math.pow(upgrade.costMultiplier, quantity));
        }

        function purchaseUpgrade(index) {
            const currentCost = getUpgradeCurrentCost(index);
            if (gameData.scratches >= currentCost) {
                gameData.scratches -= currentCost;
                gameData.upgradesOwned[index] += 1;
                
                calculateSps();
                renderShopGrid();
                updateInterfaceText();
                saveGame();
            }
        }

        function renderShopGrid() {
            const target = document.getElementById('shop-target');
            target.innerHTML = "";

            upgradeRegistry.forEach((item, index) => {
                const cost = getUpgradeCurrentCost(index);
                const count = gameData.upgradesOwned[index];
                const canAfford = gameData.scratches >= cost;

                target.innerHTML += `
                    <div class="upgrade-row">
                        <div class="upgrade-info">
                            <p class="upgrade-name">${item.name} (${count})</p>
                            <p class="upgrade-effect">+${item.spsValue} RPS • <em>${item.desc}</em></p>
                        </div>
                        <button class="buy-btn" id="buy-btn-${index}" onclick="purchaseUpgrade(${index})" ${!canAfford ? 'disabled' : ''}>
                            ${cost} PTS
                        </button>
                    </div>
                `;
            });
        }

        function updateInterfaceText() {
            const currentRubs = Math.floor(gameData.scratches);
            const labelText = currentRubs === 1 ? "Rub" : "Rubs";
            document.getElementById('total-scratches').innerText = `${currentRubs} ${labelText}`;
            
            upgradeRegistry.forEach((item, index) => {
                const cost = getUpgradeCurrentCost(index);
                const btn = document.getElementById(`buy-btn-${index}`);
                if (btn) btn.disabled = gameData.scratches < cost;
            });
        }

        // --- AUDIO ENGINE BACKGROUND CONTROLLER ---
        let audioActive = false;
        function toggleAudioEngine() {
            const player = document.getElementById('bg-audio-player');
            const btn = document.getElementById('music-toggle-btn');
            if(!player || !btn) return;

            if (!audioActive) {
                player.src = "prettyjohn1-background-music-505061.mp3";
                player.load();
                player.play().then(() => {
                    btn.innerText = "🎵 Music: ON";
                    btn.style.borderColor = "#22c55e";
                    btn.style.color = "#22c55e";
                    audioActive = true;
                }).catch(err => {
                    console.log("Audio load error:", err);
                    alert("Tap the puppy first, then try the music button!");
                });
                return;
            } else {
                player.pause();
                btn.innerText = "🎵 Music: OFF";
                btn.style.borderColor = "#ffcc00";
                btn.style.color = "#ffcc00";
                audioActive = false;
            }
        }

        // --- CHEAT ENGINE CODE MONITOR ---
        let keySequenceBuffer = "";
        const masterPasscode = "dev123";

        window.addEventListener('keydown', (e) => {
            keySequenceBuffer += e.key.toLowerCase();
            if (keySequenceBuffer.length > masterPasscode.length) {
                keySequenceBuffer = keySequenceBuffer.slice(-masterPasscode.length);
            }
            if (keySequenceBuffer === masterPasscode) {
                keySequenceBuffer = "";
                toggleAdminView(true);
            }
        });

        function toggleAdminView(show) {
            const overlay = document.getElementById('admin-panel-overlay');
            if(overlay) overlay.style.display = show ? 'flex' : 'none';
        }

        // --- DEV INTERFACE COMMAND CALLBACKS ---
        function adminGivePoints(amount) {
            gameData.scratches += amount;
            updateInterfaceText();
            saveGame();
        }

        function adminResetScore() {
            if(confirm("Completely wipe your puppy scores?")) {
                localStorage.removeItem('pibble_clicker_save');
                location.reload();
            }
        }

        setInterval(() => {
            if (gameData.totalSps > 0) {
                gameData.scratches += (gameData.totalSps / 10);
                updateInterfaceText();
            }
        }, 100);

        setInterval(saveGame, 5000);

        calculateSps();
        renderShopGrid();
        updateInterfaceText();

        // --- LEADERBOARD LOGIC & RAM SAFETY MANAGEMENT ENGINE ---

function toggleLeaderboardView(show) {
    const overlay = document.getElementById('leaderboard-overlay');
    if(overlay) {
        overlay.style.display = show ? 'flex' : 'none';
        if(show) {
            fetchLeaderboardData(); // Refreshes and renders text lists instantly when opened
        }
    }
}

function fetchLeaderboardData() {
    // 1. Instantly declare localized working arrays (forcing Render RAM cleaning)
    let cleanRubs = [];
    let cleanRps = [];

    // Temporary placeholder data. Swap out this block with your real server fetch call later!
    cleanRubs = [
        { user: "KingPibble", count: "4,150,000 Rubs" },
        { user: "DoggoScratcher", count: "1,204,900 Rubs" },
        { user: "WiggleButt", count: "840,220 Rubs" }
    ];

    cleanRps = [
        { user: "SonicSpeedGroomer", count: "240.5 RPS" },
        { user: "KingPibble", count: "118.0 RPS" },
        { user: "TreatLover", count: "45.2 RPS" }
    ];

    // 2. Render out arrays inside lists cleanly
    document.getElementById('most-rubs-list').innerHTML = cleanRubs
        .map(p => `<li>${p.user} <span style="color:#ffcc00; float:right;">${p.count}</span></li>`).join('');

    document.getElementById('rps-list').innerHTML = cleanRps
        .map(p => `<li>${p.user} <span style="color:#a855f7; float:right;">${p.count}</span></li>`).join('');

    // 3. Clear structures out completely right away so Render's memory cannot hold onto them
    cleanRubs = null;
    cleanRps = null;
}

// Global 5-minute memory safety clock interval loop tracker (300,000 milliseconds)
setInterval(() => {
    fetchLeaderboardData();
}, 300000);

// --- GOOGLE SIGN IN PROGRESS TRACKER ---
let playerProfile = null;

function handleCredentialResponse(response) {
    const token = response.credential;
    
    // Decode the token right in the browser to read their name safely
    const payload = JSON.parse(atob(token.split('.')));
    const playerEmail = payload.email;
    const playerName = payload.name;

    console.log("Logged in profile email:", playerEmail);
    console.log("Logged in profile name:", playerName);

    alert(`Welcome to Pibble Clicker, ${playerName}!`);
    document.querySelector('h1').innerText = `❤️ ${playerName}'s Pibble Clicker ❤️`;
}
</script>
</body>
</html>
